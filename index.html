  }, 1500);

}



else{

  const base = "https://cdn2.videy.co/" + id;

  loadVideo(base + ".mp4");

  function loadVideo(src){

    video.src = src;
    video.load();

  }

  video.onerror = function(){

    if(!video.dataset.movTried){

      video.dataset.movTried = "1";
      loadVideo(base + ".mov");

    }else{

      video.style.display = "none";
      videoError.style.display = "flex";

    }

  };

}
